<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>P-DAY</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/uikit@3.5.3/dist/css/uikit.css" /><!-- UIkit CSS -->
<link rel="stylesheet" href="app.css" />
<script src="//code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
<script src="//cdn.jsdelivr.net/npm/uikit@3.5.3/dist/js/uikit.min.js"></script><!-- UIkit JS -->
<script src="//cdn.jsdelivr.net/npm/uikit@3.5.3/dist/js/uikit-icons.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>
</head>
<body>
<div id="container">
    <div class="uk-container container">

        <h2 class="uk-heading-bullet">P-DAY</h2>

        <div id="app">

            <div class="uk-card uk-card-default uk-card-body">
                <div class="uk-column-1-2@s uk-column-divider">
                    <div class="col charts nth-child-1">
                        <div class="module">
                            <canvas id="chart-area" width="480" height="360"></canvas>
                        </div>
                    </div>
                    <div class="col summary nth-child-2">
                        <div class="module">
                            <div class="uk-grid-small" uk-grid>
                                <div class="uk-width-expand" uk-leader="fill: -">
                                    <span>Earned Realtime</span>
                                </div>
                                <div>
                                    <span class="earnedToday uk-badge">$ 0</span>
                                </div>
                            </div>
                            <div class="uk-grid-small" uk-grid>
                                <div class="uk-width-expand" uk-leader="fill: -">
                                    <span>Earned today</span>
                                </div>
                                <div>
                                    <span class="earnedToday uk-badge">$ 0</span>
                                </div>
                            </div>
                            <div class="uk-grid-small" uk-grid>
                                <div class="uk-width-expand" uk-leader="fill: -">
                                    <span>After tax</span>
                                </div>
                                <div>
                                    <span class="earnedTodayAfterTax uk-badge">$ 0</span>
                                </div>
                            </div>
                            <div class="uk-grid-small" uk-grid>
                                <div class="uk-width-expand" uk-leader="fill: -">
                                    <span>You worked</span>
                                </div>
                                <div>
                                    <span class="lastWorkday uk-badge">0 Days</span>
                                </div>
                            </div>
                            <div class="uk-grid-small" uk-grid>
                                <div class="uk-width-expand" uk-leader="fill: -">
                                    <span>Workdays left</span>
                                    <span class="uk-visible@m">until the next payday</span>
                                </div>
                                <div>
                                    <span class="leftWorkday uk-badge">0 Days</span>
                                </div>
                            </div>
                            <div class="uk-grid-small" uk-grid>
                                <div class="uk-width-expand" uk-leader="fill: -">
                                    <span>Next pay day</span>
                                </div>
                                <div>
                                    <span class="nextPayDay uk-badge">09/09</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <hr class="uk-divider-icon">

                <div class="uk-flex uk-flex-center">
                    <div>
                        <div class="countdown uk-grid-small uk-child-width-auto" uk-grid>
                            <div>
                                <div class="uk-countdown-number uk-countdown-days"></div>
                                <div class="uk-countdown-label uk-margin-small uk-text-center uk-visible@s">Days</div>
                            </div>
                            <div class="uk-countdown-separator">:</div>
                            <div>
                                <div class="uk-countdown-number uk-countdown-hours"></div>
                                <div class="uk-countdown-label uk-margin-small uk-text-center uk-visible@s">Hours</div>
                            </div>
                            <div class="uk-countdown-separator">:</div>
                            <div>
                                <div class="uk-countdown-number uk-countdown-minutes"></div>
                                <div class="uk-countdown-label uk-margin-small uk-text-center uk-visible@s">Minutes</div>
                            </div>
                            <div class="uk-countdown-separator">:</div>
                            <div>
                                <div class="uk-countdown-number uk-countdown-seconds"></div>
                                <div class="uk-countdown-label uk-margin-small uk-text-center uk-visible@s">Seconds</div>
                            </div>
                        </div>
                        <progress id="js-progressbar" class="uk-progress" value="10" max="100"></progress>
                    </div>
                </div>



            </div>




            <div class="uk-margin-large">
                <ul id="settings" uk-accordion>
                    <li>
                        <a class="uk-accordion-title" href="#">Settings</a>
                        <div class="uk-accordion-content">
                            <div class="uk-form-stacked">
                                <div class="uk-grid" uk-grid>
                                    <div class="uk-width-1-4@s">
                                        <label class="uk-form-label">Start Time</label>
                                        <div class="uk-form-controls">
                                            <input class="uk-input startTime" id="startTime" type="time" placeholder="" />
                                        </div>
                                    </div>
                                    <div class="uk-width-1-4@s">
                                        <label class="uk-form-label">End</label>
                                        <div class="uk-form-controls">
                                            <input class="uk-input endTime" id="endTime" type="time" placeholder="" />
                                        </div>
                                    </div>
                                    <div class="uk-width-1-4@s">
                                        <label class="uk-form-label">Payday (n day of each month)</label>
                                        <div class="uk-form-controls">
                                            <input class="uk-input payDate" id="payDate" type="text" placeholder="01" maxlength="2" />
                                        </div>
                                    </div>
                                    <div class="uk-width-1-4@s">
                                        <label class="uk-form-label">Total</label>
                                        <div class="uk-form-controls">
                                            <input class="uk-input totalMoney" id="totalMoney" type="text" data-format="money" maxlength="10" placeholder="10000000" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>

        </div>
        <a href="#" uk-totop uk-scroll></a>
    </div>
</div>
<script>
var timestamp = Math.floor(+ new Date() / 1000);
document.write('<script src="app.js?=' + timestamp + '"><\/script>');
</script>
</body>
</html>
