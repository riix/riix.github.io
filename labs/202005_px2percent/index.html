<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>변환기</title>
<link rel="stylesheet" href="app.css">
<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
</head>
<body>
<h3>버튼 좌표 px % 변환기</h3>
<div id="app">
    <div class="container">
        <div id="images" class="wrap">
            <p>
                <label><span>이미지 경로</span><input type="text" id="src" class="src large" maxlength="500" placeholder="이미지명" accept=".gif, .jpg, .png" /></label>
            </p>
            <p>
                <label><span>너비</span><input type="text" id="width" class="width" maxlength="4" value="0" placeholder="0" /></label>
                <label><span>높이</span><input type="text" id="height" class="height" maxlength="4" value="0" placeholder="0" /></label>
            </p>
        </div>
    </div>
    <div class="container">
        <div id="items" class="wrap">
            <div class="module">
                <fieldset>
                    <legend></legend>
                    <div>
                        <p>
                            <label>X 좌<input type="text" class="left number" maxlength="4" value="0" placeholder="0" /></label>
                            <label>Y 상<input type="text" class="top number" maxlength="4" value="0" placeholder="0" /></label>
                        </p>
                        <p style="margin-top: 20px; margin-left: 200px;">
                            <label>X 우<input type="text" class="right number" maxlength="4" value="0" placeholder="0" /></label>
                            <label>Y 하<input type="text" class="bottom number" maxlength="4" value="0" placeholder="0" /></label>
                        </p>
                    </div>
                    <div>
                        <h4>커스텀데이터</h4>
                        <div>
                            <label>속성<input type="text" class="dataAttr" maxlength="4" value="" placeholder="dpnm" /></label>
                            <label>내용<input type="text" class="dataAttrVal large" maxlength="30" value="" placeholder="필드내용" /></label>
                        </div>
                    </div>
                </fieldset>
                <a href="javascript:;" class="button remove"><span>삭제</span></a>
            </div>
        </div>
        <div class="action">
            <a href="javascript:;" class="button add"><span>추가</span></a>
        </div>
    </div>
    <div class="container">
        <div id="result" class="wrap">
            <h4>결과</h4>
            <textarea id="" cols="30" rows="10"></textarea>
        </div>
    </div>
    <div class="container">
        <div id="preview" class="wrap">
            <img id="image" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" />
        </div>
    </div>
</div>
<script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
<script src="app.js"></script>
</body>
</html>
