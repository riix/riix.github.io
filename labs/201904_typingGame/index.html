
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>타자연습</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
<link rel='stylesheet prefetch' href='https://cdnjs.cloudflare.com/ajax/libs/materialize/0.98.2/css/materialize.min.css'>
<link rel="stylesheet" href="./css/style.css">
<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js'></script>
</head>

<body>
<div id="container">
    <nav>
        <div class="nav-wrapper">
            <a href="#" class="brand-logo">서희/서준이 타자연습</a>
            <ul id="nav-mobile" class="right hide-on-med-and-down">
                <li><a href="sass.html">Sass</a></li>
                <li><a href="badges.html">Components</a></li>
                <li><a href="collapsible.html">JavaScript</a></li>
            </ul>
        </div>
    </nav>
    <div class="row">
        <div class="row">
            <div class="input-field col s12">
                <input id="question" type="text" class="validate field" value="서준이" disabled="disabled">
                <label for="question" data-error="wrong" data-success="right">문제</label>
            </div>
        </div>
        <div class="row">
            <div class="input-field col s12">
                <input id="answer" type="text" class="validate field">
                <label for="answer" data-error="wrong" data-success="right">답변</label>
            </div>
        </div>
        <div class="row">
            <div class="input-field col s12">
                <input id="result" type="text" class="validate field" disabled="disabled">
                <label for="result" data-error="wrong" data-success="right">결과</label>
            </div>
            <div class="input-field col s12">
                <input id="submit" type="submit" class="submit" value="확인">
            </div>
        </div>
    </div>
</div>
<script src="js/index.js"></script>
</body>

</html>
