<!DOCTYPE html><html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>으뜸이버금이 타자연습</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.5.3/dist/css/uikit.min.css" /><!-- UIkit CSS -->
<link rel="stylesheet" href="./css/app.css" />
<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.5.3/dist/js/uikit.min.js"></script><!-- UIkit JS -->
<script src="https://cdn.jsdelivr.net/npm/uikit@3.5.3/dist/js/uikit-icons.min.js"></script>
</head>
<body>
<div id="container">

    <div class="uk-container container uk-margin-top">

        <h2 class="uk-heading-bullet">으뜸이버금이 타자연습</h2><!-- 으뜸이버금이 타자 연습 -->

        <div id="app" class="uk-position-relative">

            <div class="uk-text-center" uk-grid>

                <div class="uk-width-1-2@m">
                    <div class="uk-card uk-card-default uk-card-body uk-margin-bottom">
                        <p>문제를 보고 타자로 입력해보세요</p>
                        <form id="form">
                            <div class="uk-margin">
                                <input id="question" class="uk-input uk-form-large form-question" type="text" placeholder="문제" disabled="disabled">
                            </div>
                            <div class="uk-margin">
                                <div class="uk-text-center" uk-grid>
                                    <div class="uk-width-3-4">
                                        <input id="answer" class="uk-input uk-form-large form-answer" type="text" placeholder="단어를 입력하세요">
                                    </div>
                                    <div class="uk-width-1-4">
                                        <input id="submit" type="submit" class="uk-button uk-button-primary uk-form-large form-submit" value="확인" />
                                    </div>
                                </div>
                            </div>
                            <div class="uk-margin">
                                <input id="result" class="uk-input uk-form-large form-result" type="text" placeholder="결과" disabled="disabled">
                            </div>
                        </form>
                    </div>
                </div>
                <div class="uk-width-1-2@m">
                    <div class="uk-card uk-card-default uk-card-body uk-margin-bottom">
                        <button class="uk-button uk-button-default" type="button" uk-toggle="target: +">영상 토글</button>
                        <iframe class="uk-margin-top" aria-hidden="true" hidden src="https://www.youtube-nocookie.com/embed/wsfJ6Dd6Awg?autoplay=0&amp;showinfo=0&amp;rel=0&amp;modestbranding=1&amp;playsinline=1" width="1920" height="1080" frameborder="0" allowfullscreen uk-responsive uk-video="automute: true"></iframe>
                    </div>
                </div>
            </div>
        </div>
        <a href="#" uk-totop uk-scroll></a>
    </div>
</div>
<div id="anim" class="section-animate" data-idx="0">
    <div class="module is-success">
        <div class="item">
            <img src="./img/success_01.png" alt="성공" />
            <img src="./img/success_02.png" alt="성공" />
        </div>
    </div>
    <div class="module is-fail">
        <div class="item">
            <img src="./img/fail_01.png" alt="실패" />
            <img src="./img/fail_02.png" alt="실패" />
        </div>
    </div>
</div>
<script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
