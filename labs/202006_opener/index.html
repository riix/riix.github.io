<html>
<head>
<title>배포 이미지 확인</title>
<style>
* { font-size: 14px; }
.container {}
.grid { clear: both; overflow: hidden; }
.grid::after { content: ''; display: table; overflow: hidden; clear: both; }
.col { float: left; width: 50%; }
.module { margin: 10px; }
.module button { float: right; }
.module .reset { float: left; }
.module.error a { color: #ff0000; }
.preview ul { margin: 0; padding: 0; }
.preview li { float: left; list-style: none; margin: 0; padding: 0; }
.preview li img { width: 50px; background-color: #ff0000; border: 0; vertical-align: top; }
h1 { font-size: 18px; }
h3 { font-size: 16px; }
textarea { width: 100%; height: 240px; margin-bottom: 10px; border: solid 1px #ccc; }
button { margin: 0; padding: 10px; font-size: 16px; }
</style>
<script src="https://code.jquery.com/jquery-3.5.1.slim.js" integrity="sha256-DrT5NfxfbHvMHux31Lkhxg42LY6of8TaYyK50jnxRnM=" crossorigin="anonymous"></script>
</head>
<body>
<div id="app">
    <div class="container">
        <h1>배포 이미지 확인</h1>
        <div class="grid">
            <div class="col">
                <div class="module">
                    <h3>개발 PC</h3>
                    <textarea name="" id="" cols="30" rows="10" data-name="formA1" data-path="http://stg.lghellovision.net/event/images/"></textarea>
                    <button class="button reset">초기화</button>
                    <button class="button submit">확인</button>
                    <div class="grid links"></div>
                    <div class="grid preview"></div>
                </div>
            </div>
            <div class="col">
                <div class="module">
                    <h3>상용 PC</h3>
                    <textarea name="" id="" cols="30" rows="10" data-name="formA2" data-path="http://lghellovision.net/event/images/"></textarea>
                    <button class="button reset">초기화</button>
                    <button class="button submit">확인</button>
                    <div class="grid links"></div>
                    <div class="grid preview"></div>
                </div>
            </div>
        </div>
        <div class="grid">
            <div class="col">
                <div class="module">
                    <h3>개발 모바일</h3>
                    <textarea name="" id="" cols="30" rows="10" data-name="formB1" data-mobile="true" data-path="http://mstg.lghellovision.net/event/images/"></textarea>
                    <button class="button reset">초기화</button>
                    <button class="button submit">확인</button>
                    <div class="grid links"></div>
                    <div class="grid preview"></div>
                </div>
            </div>
            <div class="col">
                <div class="module">
                    <h3>상용 모바일</h3>
                    <textarea name="" id="" cols="30" rows="10" data-name="formB2" data-mobile="true" data-path="http://m.lghellovision.net/event/images/"></textarea>
                    <button class="button reset">초기화</button>
                    <button class="button submit">확인</button>
                    <div class="grid links"></div>
                    <div class="grid preview"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
<script src="opener.js"></script>
</body>
</html>
