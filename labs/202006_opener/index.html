<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>HV 배포 이미지 점검툴</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.5.3/dist/css/uikit.min.css" /><!-- UIkit CSS -->
<style>
#container { padding: 40px 0 40px; }
.uk-grid-item-match, .uk-grid-match > * { display: block; }
.action .submit { float: right; }
a[uk-totop] { position: fixed; right: 0; bottom: 0; padding: 40px; }
.list-url {}
.list-image li { padding: 10px 0; text-align: center; }
.list-image img { margin: 0 auto; width: 100%; max-width: 200px; min-height: 50px; background-color: #ff0000; }
.error .list-url li a { color: #f0506e; }
.error .list-image  >li { background-color: #f0506e; }
</style>
<script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.5.3/dist/js/uikit.min.js"></script><!-- UIkit JS -->
<script src="https://cdn.jsdelivr.net/npm/uikit@3.5.3/dist/js/uikit-icons.min.js"></script>
</head>
<body>
<div id="container">
    <div class="uk-container container">
        <h2>HV 배포 이미지 점검툴</h2>

        <div id="app" class="uk-child-width-1-2@m uk-grid-small uk-grid-match" uk-grid uk-sortable="handle: .uk-sortable-handle">
            <div class="module" data-idx="0">
                <div class="uk-card uk-card-default uk-card-body">
                    <h3 class="uk-card-title"><span class="uk-sortable-handle uk-margin-small-right" uk-icon="icon: table"></span>개발 PC</h3>
                    <textarea class="uk-textarea uk-form-small" name="" id="" cols="30" rows="10" data-name="formA1" data-path="http://stg.lghellovision.net/event/images/"></textarea>
                    <div class="uk-margin action">
                        <button class="uk-button uk-button-default button reset">초기화</button>
                        <button class="uk-button uk-button-primary button submit">확인</button>
                    </div>
                </div>
                <div class="uk-margin links"></div>
                <div class="uk-margin preview"></div>
            </div>
            <div class="module" data-idx="1">
                <div class="uk-card uk-card-default uk-card-body">
                    <h3 class="uk-card-title"><span class="uk-sortable-handle uk-margin-small-right" uk-icon="icon: table"></span>상용 PC</h3>
                    <textarea class="uk-textarea uk-form-small" name="" id="" cols="30" rows="10" data-name="formA2" data-path="http://lghellovision.net/event/images/"></textarea>
                    <div class="uk-margin action">
                        <button class="uk-button uk-button-default button reset">초기화</button>
                        <button class="uk-button uk-button-primary button submit">확인</button>
                    </div>
                </div>
                <div class="uk-margin links"></div>
                <div class="uk-margin preview"></div>
            </div>
            <div class="module" data-idx="2">
                <div class="uk-card uk-card-default uk-card-body">
                    <h3 class="uk-card-title"><span class="uk-sortable-handle uk-margin-small-right" uk-icon="icon: table"></span>개발 모바일</h3>
                    <textarea class="uk-textarea uk-form-small" name="" id="" cols="30" rows="10" data-name="formB1" data-mobile="true" data-path="http://mstg.lghellovision.net/event/images/"></textarea>
                    <div class="uk-margin action">
                        <button class="uk-button uk-button-default button reset">초기화</button>
                        <button class="uk-button uk-button-primary button submit">확인</button>
                    </div>
                </div>
                <div class="uk-margin links"></div>
                <div class="uk-margin preview"></div>
            </div>
            <div class="module" data-idx="3">
                <div class="uk-card uk-card-default uk-card-body">
                    <h3 class="uk-card-title"><span class="uk-sortable-handle uk-margin-small-right" uk-icon="icon: table"></span>상용 모바일</h3>
                    <textarea class="uk-textarea uk-form-small" name="" id="" cols="30" rows="10" data-name="formB2" data-mobile="true" data-path="http://m.lghellovision.net/event/images/"></textarea>
                    <div class="uk-margin action">
                        <button class="uk-button uk-button-default button reset">초기화</button>
                        <button class="uk-button uk-button-primary button submit">확인</button>
                    </div>
                </div>
                <div class="uk-margin links"></div>
                <div class="uk-margin preview"></div>
            </div>
        </div>

        <a href="#" uk-totop uk-scroll></a>
    </div>
</div>
<script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
<script src="opener.js"></script>
</body>
</html>
