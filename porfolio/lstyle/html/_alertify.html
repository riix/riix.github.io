<body>

<h2>Dialogs</h2>
<a href="#" id="alert">Alert Dialog</a><br>
<a href="#" id="confirm">Confirm Dialog</a><br>
<a href="#" id="prompt">Prompt Dialog</a><br>

<a href="#" id="focus">Button Focus</a><br>
<a href="#" id="order">Button Order</a>

<a href="#" id="info">Standard Log</a><br>
<a href="#" id="success">Success Log</a><br>
<a href="#" id="error">Error Log</a><br>
<a href="#" id="delay">Hide in 10 seconds</a><br>
<a href="#" id="forever">Persistent Log</a>

<a href="#" id="notiAPI">Create Log</a><br>
<a href="#" class="is-disabled" id="closeAPI">Close Log</a><br>

<a href="#" class="is-disabled" id="reshowAPI">Reshow Log</a>

<h2>Themes</h2>
<a href="#" id="bootstrap">Bootstrap Theme</a>

<script src="../resources/js/plugin-dist.js?ver=1"></script>
<script src="../resources/js/module-dist.js?ver=1"></script>
<script src="../resources/js/demo-dist.js?ver=1"></script><!-- demo -->

<script>
$(function(){

    var $window = $window || $(window),
        $document = $document || $(document),
        $html = $html || $('html');

    function reset () {
        $("#toggleCSS").attr("href", "../themes/alertify.default.css");
        alertify.set({
            labels : {
                ok     : "OK",
                cancel : "Cancel"
            },
            delay : 5000,
            buttonReverse : false,
            buttonFocus   : "ok"
        });
    }

    // ==============================
    // Standard Dialogs
    $("#alert").on( 'click', function () {
        reset();
        alertify.alert("This is an alert dialog");
        return false;
    });

    $("#confirm").on( 'click', function () {
        reset();
        alertify.confirm("This is a confirm dialog", function (e) {
            if (e) {
                alertify.success("You've clicked OK");
            } else {
                alertify.error("You've clicked Cancel");
            }
        });
        return false;
    });

    $("#prompt").on( 'click', function () {
        reset();
        alertify.prompt("This is a prompt dialog", function (e, str) {
            if (e) {
                alertify.success("You've clicked OK and typed: " + str);
            } else {
                alertify.error("You've clicked Cancel");
            }
        }, "Default Value");
        return false;
    });

    // ==============================
    // Ajax
    $("#ajax").on("click", function () {
        reset();
        alertify.confirm("Confirm?", function (e) {
            if (e) {
                alertify.alert("Successful AJAX after OK");
            } else {
                alertify.alert("Successful AJAX after Cancel");
            }
        });
    });

    // ==============================
    // Standard Dialogs
    $("#notification").on( 'click', function () {
        reset();
        alertify.log("Standard log message");
        return false;
    });

    $("#success").on( 'click', function () {
        reset();
        alertify.success("Success log message");
        return false;
    });

    $("#error").on( 'click', function () {
        reset();
        alertify.error("Error log message");
        return false;
    });

    // ==============================
    // Custom Properties
    $("#delay").on( 'click', function () {
        reset();
        alertify.set({ delay: 10000 });
        alertify.log("Hiding in 10 seconds");
        return false;
    });

    $("#forever").on( 'click', function () {
        reset();
        alertify.log("Will stay until clicked", "", 0);
        return false;
    });

    $("#labels").on( 'click', function () {
        reset();
        alertify.set({ labels: { ok: "Accept", cancel: "Deny" } });
        alertify.confirm("Confirm dialog with custom button labels", function (e) {
            if (e) {
                alertify.success("You've clicked OK");
            } else {
                alertify.error("You've clicked Cancel");
            }
        });
        return false;
    });

    $("#focus").on( 'click', function () {
        reset();
        alertify.set({ buttonFocus: "cancel" });
        alertify.confirm("Confirm dialog with cancel button focused", function (e) {
            if (e) {
                alertify.success("You've clicked OK");
            } else {
                alertify.error("You've clicked Cancel");
            }
        });
        return false;
    });

    $("#order").on( 'click', function () {
        reset();
        alertify.set({ buttonReverse: true });
        alertify.confirm("Confirm dialog with reversed button order", function (e) {
            if (e) {
                alertify.success("You've clicked OK");
            } else {
                alertify.error("You've clicked Cancel");
            }
        });
        return false;
    });

    // ==============================
    // Custom Log
    $("#custom").on( 'click', function () {
        reset();
        alertify.custom = alertify.extend("custom");
        alertify.custom("I'm a custom log message");
        return false;
    });

    // ==============================
    // Custom Themes
    $("#bootstrap").on( 'click', function () {
        reset();
        $("#toggleCSS").attr("href", "../themes/alertify.bootstrap.css");
        alertify.prompt("Prompt dialog with bootstrap theme", function (e) {
            if (e) {
                alertify.success("You've clicked OK");
            } else {
                alertify.error("You've clicked Cancel");
            }
        }, "Default Value");
        return false;
    });
});
</script>
