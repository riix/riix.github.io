.js-text-motion {
    visibility: hidden;

    text-align: center;

.utility {
    position: fixed;

    margin: 20px;
}
.utility a { transition: color .2s ease-in-out; }
.utility a { color: #000; }
.top {
    top: 0;
}
.middle {
    top: 50%;
    transform: translate(0, -50%);
}
.bottom {
    bottom: 0;
}
.left {

}
.right {
    right: 0;
}
.top a { color: #000; }
.middle a { color: #000; }
.bottom a { color: #000; }
.is-dark-upper .top a { color: #fff; }

.table .cell { height: 100vh; vertical-align: middle; }

.js-img-placeholdr,
.js-img-placeholdr-bg {

    width: 100%;
